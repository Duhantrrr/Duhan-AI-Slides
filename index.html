<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhan Slides AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .amber-glow { shadow-[0_0_50px_-10px_#f59e0b]; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Dekoratif Işıklar -->
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-amber-500/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-500/10 rounded-full blur-[120px]"></div>

    <div class="glass max-w-xl w-full rounded-[3rem] p-12 shadow-2xl text-center z-10">
        <h1 class="text-6xl font-black tracking-tighter mb-2">DUHAN <span class="text-amber-500">AI</span></h1>
        <p class="text-slate-500 uppercase tracking-[0.4em] text-[10px] font-bold mb-10">Premium Presentation Engine</p>

        <div class="space-y-6">
            <input type="text" id="topic" placeholder="Hangi konuda sunum istersiniz?" 
                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-3xl px-8 py-5 text-lg outline-none focus:ring-2 focus:ring-amber-500 transition-all placeholder:text-slate-600">
            
            <button onclick="generate()" id="btn" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-5 rounded-3xl text-xl transition-all shadow-lg active:scale-95">
                SUNUMU TASARLA
            </button>
        </div>

        <div id="status" class="hidden mt-10">
            <div class="w-10 h-10 border-4 border-amber-500/20 border-t-amber-500 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-slate-400 text-sm animate-pulse">Duhan AI başyapıtını oluşturuyor...</p>
        </div>
    </div>

    <script>
        async function generate() {
            const topic = document.getElementById('topic').value;
            if(!topic) return;

            const btn = document.getElementById('btn');
            const status = document.getElementById('status');

            btn.disabled = true;
            status.classList.remove('hidden');

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ topic })
                });
                
                const data = await response.json();
                
                const link = document.createElement('a');
                link.href = 'data:application/vnd.openxmlformats-officedocument.presentationml.presentation;base64,' + data.buffer;
                link.download = data.fileName;
                link.click();

                status.innerHTML = "<p class='text-amber-500 font-bold'>Sunum İndirildi!</p>";
                setTimeout(() => {
                    status.classList.add('hidden');
                    btn.disabled = false;
                }, 3000);

            } catch (e) {
                alert("Bir hata oluştu.");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
