<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhan Slides AI | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); }
        .amber-glow { filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.4)); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] bg-amber-500/10 rounded-full blur-[120px]"></div>
    
    <div class="glass max-w-2xl w-full rounded-[3.5rem] p-16 shadow-2xl text-center z-10 border border-white/5">
        <h1 class="text-7xl font-black tracking-tighter mb-4 amber-glow">DUHAN <span class="text-amber-500">AI</span></h1>
        <p class="text-slate-500 uppercase tracking-[0.5em] text-[10px] font-bold mb-12">The Ultimate Presentation Architect</p>

        <div class="space-y-6">
            <textarea id="topic" rows="3" placeholder="Sunumun konusunu ve detaylarını buraya bırakın..." 
                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-3xl px-8 py-6 text-lg outline-none focus:ring-2 focus:ring-amber-500 transition-all placeholder:text-slate-600 resize-none"></textarea>
            
            <button onclick="generate()" id="btn" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-6 rounded-3xl text-xl transition-all shadow-2xl active:scale-95">
                BAŞYAPITI OLUŞTUR
            </button>
        </div>

        <div id="status" class="hidden mt-12">
            <div class="w-12 h-12 border-4 border-amber-500/20 border-t-amber-500 rounded-full animate-spin mx-auto mb-6"></div>
            <p id="stText" class="text-slate-400 text-sm font-medium">Stratejik analiz ve görsel planlama yapılıyor...</p>
        </div>
    </div>

    <script>
        async function generate() {
            const topic = document.getElementById('topic').value;
            if(!topic) return;
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const stText = document.getElementById('stText');

            btn.disabled = true; btn.style.opacity = "0.5";
            status.classList.remove('hidden');

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ topic })
                });
                const data = await response.json();
                
                const link = document.createElement('a');
                link.href = 'data:application/vnd.openxmlformats-officedocument.presentationml.presentation;base64,' + data.buffer;
                link.download = data.fileName;
                link.click();

                stText.innerText = "Başarıyla İndirildi!";
                setTimeout(() => { location.reload(); }, 2000);
            } catch (e) {
                alert("Bir hata oluştu.");
                location.reload();
            }
        }
    </script>
</body>
</html>
